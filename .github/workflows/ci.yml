name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Build-time only — never called at build, just need to be non-empty so
      # `vite build` can inline them into the bundle.
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: ci-placeholder
      VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
      VITE_FIREBASE_APP_ID: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
