name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Build-time only — never called at build, just need to be non-empty so
      # `vite build` can inline them into the bundle.
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: ci-placeholder
      VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
      VITE_FIREBASE_APP_ID: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Firestore emulator (used by test:rules below) runs on the JVM.
      # firebase-tools requires JDK 21+ as of the version pinned in
      # package-lock.json (17 was fine when this step was first added, then
      # a later `npm audit fix` bumped firebase-tools and raised the floor —
      # this broke CI on main for two pushes before being caught, since a
      # push only confirms the run STARTED, not that it finished green).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # The emulator jar (~60MB) is downloaded on first use and cached here by
      # firebase-tools; without this cache every CI run re-downloads it.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # Only gates production dependencies (firebase/leaflet/zod) at high+
      # severity. Dev-tooling vulnerabilities (vite/eslint/firebase-tools'
      # transitive deps) are known and don't ship to users — see SECURITY.md.
      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Test
        run: npm test

      - name: Firestore rules test
        run: npm run test:rules

      - name: Build
        run: npm run build
